name: Build and push to Ciphera registry

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

env:
  REGISTRY: registry.ops.ciphera.net

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "image_name=ciphera-net/pulse-frontend" >> "$GITHUB_OUTPUT"
            echo "dokploy_app_id=${{ secrets.DOKPLOY_PULSE_FRONTEND_PROD_APP_ID }}" >> "$GITHUB_OUTPUT"
            echo "vault_kv_path=kv/data/pulse-frontend/config" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=ciphera-net/pulse-frontend-staging" >> "$GITHUB_OUTPUT"
            echo "dokploy_app_id=${{ secrets.DOKPLOY_PULSE_FRONTEND_STAGING_APP_ID }}" >> "$GITHUB_OUTPUT"
            echo "vault_kv_path=kv/data/pulse-frontend-staging/config" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Teleport
        uses: teleport-actions/setup@v1
        with:
          version: "18.7.2"
          proxy: teleport.ciphera.net:443

      - name: Teleport tunnel to Vault
        id: vault-tunnel
        uses: teleport-actions/application-tunnel@v1
        with:
          proxy: teleport.ciphera.net:443
          token: ci-deploy
          app: vault
          listen: "tcp://127.0.0.1:8200"
          diag-port: 57001

      - name: Read build config from Vault
        id: vault-config
        run: |
          VAULT_ADDR=http://127.0.0.1:8200
          TOKEN=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/approle/login" \
            -d "{\"role_id\":\"${{ secrets.VAULT_CI_ROLE_ID }}\",\"secret_id\":\"${{ secrets.VAULT_CI_SECRET_ID }}\"}" \
            | jq -r '.auth.client_token')
          CONFIG=$(curl -sf -H "X-Vault-Token: ${TOKEN}" \
            "${VAULT_ADDR}/v1/${{ steps.target.outputs.vault_kv_path }}" \
            | jq -r '.data.data')
          NPM_TOKEN=$(curl -sf -H "X-Vault-Token: ${TOKEN}" \
            "${VAULT_ADDR}/v1/kv/data/shared/github-npm-token" \
            | jq -r '.data.data.value')
          {
            echo "NEXT_PUBLIC_API_URL=$(echo "$CONFIG" | jq -r '.next_public_api_url')"
            echo "NEXT_PUBLIC_APP_URL=$(echo "$CONFIG" | jq -r '.next_public_app_url')"
            echo "NEXT_PUBLIC_ID_URL=$(echo "$CONFIG" | jq -r '.next_public_id_url // "https://id.ciphera.net"')"
            echo "NEXT_PUBLIC_ID_API_URL=$(echo "$CONFIG" | jq -r '.next_public_id_api_url // "https://api.id.ciphera.net"')"
            echo "NEXT_PUBLIC_CAPTCHA_API_URL=$(echo "$CONFIG" | jq -r '.next_public_captcha_api_url // "https://captcha.ciphera.net/api/v1"')"
            echo "NEXT_PUBLIC_CHARGEBEE_SITE=$(echo "$CONFIG" | jq -r '.next_public_chargebee_site')"
            echo "NEXT_PUBLIC_CHARGEBEE_PUBLISHABLE_KEY=$(echo "$CONFIG" | jq -r '.next_public_chargebee_publishable_key')"
            echo "NEXT_PUBLIC_CDN_URL=$(echo "$CONFIG" | jq -r '.next_public_cdn_url')"
            echo "NPM_AUTH_TOKEN=${NPM_TOKEN}"
          } >> "$GITHUB_OUTPUT"

      - name: Write .npmrc from Vault token
        run: |
          {
            echo "@ciphera-net:registry=https://npm.pkg.github.com/"
            echo "//npm.pkg.github.com/:_authToken=${{ steps.vault-config.outputs.NPM_AUTH_TOKEN }}"
            echo "legacy-peer-deps=true"
          } > /tmp/npmrc

      - name: Log in to Ciphera registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CIPHERA_REGISTRY_USER }}
          password: ${{ secrets.CIPHERA_REGISTRY_PASSWORD }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.target.outputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.target.outputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.target.outputs.image_name }}:buildcache,mode=max
          secret-files: |
            npmrc=/tmp/npmrc
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.vault-config.outputs.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ steps.vault-config.outputs.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_ID_URL=${{ steps.vault-config.outputs.NEXT_PUBLIC_ID_URL }}
            NEXT_PUBLIC_ID_API_URL=${{ steps.vault-config.outputs.NEXT_PUBLIC_ID_API_URL }}
            NEXT_PUBLIC_CAPTCHA_API_URL=${{ steps.vault-config.outputs.NEXT_PUBLIC_CAPTCHA_API_URL }}
            NEXT_PUBLIC_CHARGEBEE_SITE=${{ steps.vault-config.outputs.NEXT_PUBLIC_CHARGEBEE_SITE }}
            NEXT_PUBLIC_CHARGEBEE_PUBLISHABLE_KEY=${{ steps.vault-config.outputs.NEXT_PUBLIC_CHARGEBEE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CDN_URL=${{ steps.vault-config.outputs.NEXT_PUBLIC_CDN_URL }}

      - name: Upload tracking scripts to CDN
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.EXOSCALE_CDN_SCRIPTS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EXOSCALE_CDN_SCRIPTS_SECRET }}
          AWS_DEFAULT_REGION: ch-dk-2
        run: |
          for file in script.js script.frustration.js script.interactions.js script-sri.json; do
            ct="application/javascript"
            [ "$file" = "script-sri.json" ] && ct="application/json"
            aws s3 cp "public/$file" "s3://ciphera-scripts/$file" \
              --endpoint-url https://sos-ch-dk-2.exo.io \
              --content-type "$ct" \
              --cache-control "public, max-age=7200" \
              --acl public-read \
              --quiet
          done
          echo "Scripts uploaded to CDN"

      - name: Purge CDN cache for tracking scripts
        if: github.ref == 'refs/heads/main'
        run: |
          for path in script.js script.frustration.js script.interactions.js script-sri.json; do
            curl -fsS -X POST \
              "https://api.bunny.net/purge?url=https://js.ciphera.net/$path&async=false" \
              -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}"
          done
          echo "CDN cache purged"

      - name: Stop Vault tunnel
        run: |
          kill ${{ steps.vault-tunnel.outputs.tbot-pid }} 2>/dev/null || true
          sleep 1

      - name: Teleport tunnel to Dokploy
        id: tunnel
        uses: teleport-actions/application-tunnel@v1
        with:
          proxy: teleport.ciphera.net:443
          token: ci-deploy
          app: dokploy-pulse
          listen: "tcp://127.0.0.1:9090"
          diag-port: 57002

      - name: Trigger Dokploy redeploy
        run: |
          sleep 3
          curl -fsS -X POST \
            -H "x-api-key: ${{ secrets.DOKPLOY_PULSE_OPS_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ steps.target.outputs.dokploy_app_id }}\"}" \
            http://localhost:9090/api/application.deploy

      - name: Annotate deployment in Grafana
        if: github.ref == 'refs/heads/main' && success()
        continue-on-error: true
        run: |
          curl -fsS -X POST \
            "http://10.10.0.40:3000/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"Deploy: pulse-frontend ${{ github.sha }}","tags":["deployment","pulse-frontend"]}'

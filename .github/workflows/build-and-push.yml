name: Build and push to Ciphera registry

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

env:
  REGISTRY: registry.ops.ciphera.net

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image name, Dokploy app ID, and build-time env
        id: target
        run: |
          # NEXT_PUBLIC_* values differ between prod and staging for three
          # variables (API URL, APP URL, MOLLIE testmode). The rest are
          # identical and set as build-args directly below. These values
          # are inlined into the client JS bundle by `next build` — they
          # ship to the browser either way, so plaintext in the workflow
          # is fine and keeps the source of truth in one reviewable place.
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "image_name=ciphera-net/pulse-frontend" >> "$GITHUB_OUTPUT"
            echo "dokploy_app_id=${{ secrets.DOKPLOY_PULSE_FRONTEND_PROD_APP_ID }}" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://pulse-api.ciphera.net" >> "$GITHUB_OUTPUT"
            echo "public_app_url=https://pulse.ciphera.net" >> "$GITHUB_OUTPUT"
            echo "public_mollie_testmode=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=ciphera-net/pulse-frontend-staging" >> "$GITHUB_OUTPUT"
            echo "dokploy_app_id=${{ secrets.DOKPLOY_PULSE_FRONTEND_STAGING_APP_ID }}" >> "$GITHUB_OUTPUT"
            echo "public_api_url=https://pulse-api-staging.ciphera.net" >> "$GITHUB_OUTPUT"
            echo "public_app_url=https://pulse-staging.ciphera.net" >> "$GITHUB_OUTPUT"
            echo "public_mollie_testmode=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write .npmrc for GitHub Packages auth
        run: |
          {
            echo "@ciphera-net:registry=https://npm.pkg.github.com/"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_READ_TOKEN }}"
            echo "legacy-peer-deps=true"
          } > /tmp/npmrc

      - name: Log in to Ciphera registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CIPHERA_REGISTRY_USER }}
          password: ${{ secrets.CIPHERA_REGISTRY_PASSWORD }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.target.outputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.target.outputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.target.outputs.image_name }}:buildcache,mode=max
          secret-files: |
            npmrc=/tmp/npmrc
          # Per-branch values come from the `target` step. Shared values are
          # inlined directly. scripts/validate-env.mjs (prebuild hook) fails
          # the build loudly if any required var is missing.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.target.outputs.public_api_url }}
            NEXT_PUBLIC_APP_URL=${{ steps.target.outputs.public_app_url }}
            NEXT_PUBLIC_MOLLIE_TESTMODE=${{ steps.target.outputs.public_mollie_testmode }}
            NEXT_PUBLIC_AUTH_URL=https://auth.ciphera.net
            NEXT_PUBLIC_AUTH_API_URL=https://auth-api.ciphera.net
            NEXT_PUBLIC_CAPTCHA_API_URL=https://captcha.ciphera.net/api/v1
            NEXT_PUBLIC_MOLLIE_PROFILE_ID=pfl_3WTMG2peXk

      - name: Install Teleport
        uses: teleport-actions/setup@v1
        with:
          version: "18.7.2"
          proxy: teleport.ciphera.net:443

      - name: Teleport tunnel to Dokploy
        id: tunnel
        uses: teleport-actions/application-tunnel@v1
        with:
          proxy: teleport.ciphera.net:443
          token: ci-deploy
          app: dokploy-pulse
          listen: "127.0.0.1:9090"

      - name: Trigger Dokploy redeploy
        run: |
          curl -fsS -X POST \
            -H "x-api-key: ${{ secrets.DOKPLOY_PULSE_OPS_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ steps.target.outputs.dokploy_app_id }}\"}" \
            http://localhost:9090/api/application.deploy
